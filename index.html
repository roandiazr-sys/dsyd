<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Presentacion DSYD</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main id="app" aria-live="polite">
    <section class="stage" id="stage"></section>
    <nav class="controls" aria-label="Controles de presentacion">
      <button class="icon-button" id="prev" type="button" aria-label="Anterior" title="Anterior">&lsaquo;</button>
      <output id="counter" aria-label="Diapositiva actual"></output>
      <button class="icon-button" id="next" type="button" aria-label="Siguiente" title="Siguiente">&rsaquo;</button>
      <button class="icon-button" id="fullscreen" type="button" aria-label="Pantalla completa" title="Pantalla completa">&#9974;</button>
    </nav>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
